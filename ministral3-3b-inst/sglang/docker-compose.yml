services:
  sglang-ministral3-3b-inst:
    image: lmsysorg/sglang:latest
    container_name: sglang-ministral3-3b-inst
    gpus: all
    restart: always

    ports:
      - "8000:8000"

    environment:
      - HF_TOKEN=${HF_TOKEN}
      - SGLANG_ENABLE_SPEC_V2=1
      - HF_HUB_ENABLE_HF_TRANSFER=1

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    entrypoint: sglang serve

    command: --model-path mistralai/Ministral-3-3B-Instruct-2512
      --trust-remote-code
      --tool-call-parser mistral
      --host 0.0.0.0
      --port "8000"

    shm_size: "16gb"

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ./gateway
    container_name: fastapi-gateway
    restart: always

    depends_on:
      - sglang-ministral3-3b-inst

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - gateway

    logging:
      options:
        max-size: "10m"
        max-file: "3"
