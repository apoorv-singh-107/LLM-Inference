version: "3.9"

services:
  vllm-nemotron3-nano-4b:
    image: vllm/vllm-openai:v0.17.0
    container_name: nemotron3-nano-4b
    gpus: all
    restart: always

    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./nano_v3_reasoning_parser.py:/app/nano_v3_reasoning_parser.py

    command: >
      --model nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16
      --served-model-name nemotron3-nano-4B-BF16
      --max-num-seqs 8
      --tensor-parallel-size 1
      --max-model-len 262144
      --port 8000
      --trust-remote-code
      --mamba-ssm-cache-dtype float32
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser-plugin /app/nano_v3_reasoning_parser.py
      --reasoning-parser nano_v3
      --host 0.0.0.0

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ./gateway
    container_name: fastapi-gateway
    restart: always

    depends_on:
      - vllm-nemotron3-nano-4b

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - gateway

    logging:
      options:
        max-size: "10m"
        max-file: "3"
