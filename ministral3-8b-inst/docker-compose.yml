version: "3.9"

services:
  vllm-ministral3-8b-inst:
    image: vllm/vllm-openai:latest
    container_name: ministral3-8b-inst
    gpus: all
    restart: always

    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    command: >
      --model mistralai/Ministral-3-8B-Instruct-2512
      --tokenizer-mode mistral
      --config-format mistral
      --load-format mistral
      --enable-auto-tool-choice
      --tool-call-parser mistral
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
      --max-model-len 32768
      --max-num-batched-tokens 1024
      --max-num-seqs 16

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ./gateway
    container_name: fastapi-gateway
    restart: always

    depends_on:
      - vllm-ministral3-8b-inst

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - gateway

    logging:
      options:
        max-size: "10m"
        max-file: "3"
