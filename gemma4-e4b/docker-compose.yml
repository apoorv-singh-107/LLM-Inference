services:
  sglang-gemma4-e4b:
    image: lmsysorg/sglang:gemma4
    container_name: sglang-gemma4-e4b
    gpus: all
    restart: always

    ports:
      - "8000:8000"

    environment:
      - HF_TOKEN=${HF_TOKEN}

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    entrypoint: python3 -m sglang.launch_server

    command: --model-path google/gemma-4-E4B-it
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --host 0.0.0.0
      --port "8000"

    shm_size: "16gb"

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ./gateway
    container_name: fastapi-gateway
    restart: always

    depends_on:
      - sglang-gemma4-e4b

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - gateway

    logging:
      options:
        max-size: "10m"
        max-file: "3"
